<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melik spor HD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            padding: 20px;
            width: 100%;
            text-align: center;
            background-color: #1f1f1f;
            border-bottom: 2px solid #333;
        }
        .container {
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }
        .tabs {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .tab-button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .tab-button:hover {
            background-color: #555;
        }
        .tab-button.active {
            background-color: #e50914; /* Spor kanalı vurgusu için kırmızı */
        }
        #video-container {
            width: 100%;
            background-color: black;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: 100%;
        }
        .status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <h1>Melik spor HD</h1>
</header>

<div class="container">
    <h3>Kanallar</h3>
    <div class="tabs">
        <button class="tab-button" onclick="playM3U8('https://test-url-buraya.m3u8', this)">BeinSports 1</button>
        <button class="tab-button" onclick="playM3U8('https://dga1op10s1u3leo.ec876fd9240622.click/live/xbeinsports-2/playlist.m3u8', this)">BeinSports 2</button>
    </div>

    <div id="video-container">
        <video id="video" controls autoplay></video>
    </div>
    
    <div class="status" id="status-text">Kanal seçiniz...</div>
</div>

<script>
    function playM3U8(url, button) {
        var video = document.getElementById('video');
        var status = document.getElementById('status-text');
        
        // Aktif buton rengini güncelle
        var buttons = document.getElementsByClassName('tab-button');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].classList.remove('active');
        }
        button.classList.add('active');

        status.innerText = "Yükleniyor: " + button.innerText;

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } 
        // Safari gibi HLS'yi yerel destekleyen tarayıcılar için
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        } else {
            alert("Tarayıcınız bu yayın formatını desteklemiyor.");
        }
    }

    // Bein 2'yi başlangıçta otomatik yüklemek istersen burayı açabilirsin:
    // document.querySelectorAll('.tab-button')[1].click();
</script>

</body>
</html>
